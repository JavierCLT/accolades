name: Merrill Edge Daily Monitor

on:
  schedule:
    - cron: "15 12 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set cache date
        id: cache-date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore SQLite state
        uses: actions/cache@v4
        with:
          path: data/monitor.sqlite
          key: ${{ runner.os }}-merrill-monitor-sqlite-${{ steps.cache-date.outputs.date }}
          restore-keys: |
            ${{ runner.os }}-merrill-monitor-sqlite-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[llm]

      - name: Run monitor
        env:
          DB_PATH: data/monitor.sqlite
          LOG_LEVEL: INFO
          LOCAL_TIMEZONE: America/New_York
          SEND_EMPTY_DIGEST: "false"
          MAX_ITEMS_PER_DIGEST: "30"
          GOOGLE_CSE_API_KEY: ${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          EMAIL_BACKEND: ${{ secrets.EMAIL_BACKEND }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_STARTTLS: ${{ secrets.SMTP_STARTTLS }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          LLM_CLASSIFIER_ENABLED: ${{ secrets.LLM_CLASSIFIER_ENABLED }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_REASONING_EFFORT: low
        run: merrill-monitor run --sources sources.yaml --queries queries.yaml
